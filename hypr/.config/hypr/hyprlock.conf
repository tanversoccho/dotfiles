# ══════════════════════════════════════════════
# hyprlock.conf — Modern Dark Theme
# Simple, clean, readable
# ══════════════════════════════════════════════

general {
  disable_loading_bar    = true
    hide_cursor            = true
    grace                  = 0
    no_fade_in             = false
    no_fade_out            = false
    ignore_empty_input     = false
    text_trim              = true
}

# ── Background ──
background {
  monitor     =
    path        = /home/tr/project/walpaper/2.jpg
    blur_size   = 3
    blur_passes = 2
    brightness  = 0.8
    color       = rgba(0, 0, 0, 1.0)
}

# ── Input Field ──
input-field {
  monitor         =
    size            = 320, 42
    position        = 0, -60
    halign          = center
    valign          = center

    outline_thickness    = 2
    dots_text_format     = *
    dots_spacing         = 0.20
    dots_center          = true

    outer_color          = rgba(255, 255, 255, 0.3)
    inner_color          = rgba(0, 0, 0, 0.6)
    font_color           = rgba(255, 255, 255, 0.9)
    placeholder_text     = Enter password...

    rounding             = 8
    check_color          = rgba(0, 255, 100, 0.8)
    fail_color           = rgba(255, 50, 50, 0.8)
    fail_text            = INCORRECT PASSWORD
    fail_transition      = 300

    hide_input           = false
    fade_on_empty        = true
}

# ── Username ──
label {
    monitor     =
    text        = cmd[update:0] echo "$USER" | tr '[:lower:]' '[:upper:]'
    color       = rgba(255, 255, 255, 0.9)
    font_size   = 13
    font_family = monospace
    position    = 0, 80
    halign      = center
    valign      = center
}

# ── Clock (12-hour) ──
label {
    monitor     =
    text        = cmd[update:1000] date '+%I:%M %p'
    color       = rgba(255, 255, 255, 0.9)
    font_size   = 46
    font_family = monospace
    position    = 0, 40
    halign      = center
    valign      = center
}

# ── Date (with weekday and line break) ──
label {
    monitor     =
    text        = cmd[update:60000] date '+%A,%d %B %Y'
    color       = rgba(255, 255, 255, 0.6)
    font_size   = 18
    font_family = monospace
    position    = 0, -8
    halign      = center
    valign      = center
}

# ── Top Left ──
label {
  monitor     =
    text        = cmd[update:0] printf "SESSION LOCKED\nNODE · $USER@$HOSTNAME"
    color       = rgba(255, 255, 255, 0.5)
    font_size   = 9
    font_family = monospace
    position    = 30, -30
    halign      = left
    valign      = top
}

# ── Top Right - Calendar ──
label {
    monitor     =
    text        = cmd[update:3600000] cal
    color       = rgba(255, 255, 255, 0.5)
    font_size   = 9
    font_family = monospace
    position    = -30, -30
    halign      = right
    valign      = top
}

# ── Bottom Left ──
label {
  monitor     =
    text        = cmd[update:0] printf "KERNEL $(uname -r | cut -d- -f1)\nWM · hyprland"
    color       = rgba(255, 255, 255, 0.5)
    font_size   = 9
    font_family = monospace
    position    = 30, 30
    halign      = left
    valign      = bottom
}

# ── Bottom Right ──
label {
  monitor     =
    text        = cmd[update:0] printf "ARCH LINUX\n$(lspci | grep -i 'vga\|3d' | head -1 | sed 's/.*\[\(.*\)\].*/\1/' | cut -c1-16)"
    color       = rgba(255, 255, 255, 0.5)
    font_size   = 9
    font_family = monospace
    position    = -30, 30
    halign      = right
    valign      = bottom
}
